<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro - Despachante Guaxupé</title>
  <link rel="stylesheet" href="css/cadastro.css" />
</head>
<body>

<div class="cadastro-container">
  <div class="logo">Despachante <span>Guaxupé</span></div>

  <form id="formCadastro">
    <div class="form-group">
      <label>Nome Completo *</label>
      <input type="text" id="nome" required placeholder="Nome">
    </div>

    <div class="form-group">
      <label>Email *</label>
      <input type="email" id="email" required placeholder="Email">
    </div>

    <div class="form-group">
      <label>Confirmar Email *</label>
      <input type="email" id="confirmarEmail" required placeholder="Confirme seu email">
    </div>

    <div class="form-group">
      <label>Telefone *</label>
      <input type="tel" id="telefone" required placeholder="Telefone">
    </div>

    <div class="form-group senha-group">
      <label>Senha *</label>
      <div class="senha-box">
        <input type="password" id="senha" required placeholder="Senha">
        <button type="button" class="toggle-senha" onclick="alternarSenha('senha', 'iconeSenha1')" aria-label="Mostrar senha">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="form-group senha-group">
      <label>Confirmar Senha *</label>
      <div class="senha-box">
        <input type="password" id="confirmaSenha" required placeholder="Confirme a senha">
        <button type="button" class="toggle-senha" onclick="alternarSenha('confirmaSenha', 'iconeSenha2')" aria-label="Mostrar senha">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button type="submit" class="btn-cadastro">Cadastrar</button>
    <div class="mensagem" id="mensagem"></div>
    <p class="link-login">Já tem conta? <a href="login.html">Faça login aqui</a></p>
  </form>
</div>

<script src="js/cadastro.js"></script>
</body>
</html>
