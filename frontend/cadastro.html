<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro - Despachante Guaxupé</title>
  <link rel="stylesheet" href="css/cadastro.css" />
</head>
<body>

<div class="cadastro-container">
  <div class="logo">Despachante <span>Guaxupé</span></div>

  <form id="formCadastro">
    <div class="form-group">
      <label>Nome Completo *</label>
      <input type="text" id="nome" required placeholder="Nome">
    </div>

    <div class="form-group">
      <label>Email *</label>
      <input type="email" id="email" required placeholder="Email">
    </div>

    <div class="form-group">
      <label>Confirmar Email *</label>
      <input type="email" id="confirmarEmail" required placeholder="Confirme seu email">
    </div>

    <div class="form-group">
      <label>Telefone *</label>
      <input type="tel" id="telefone" required placeholder="Telefone">
    </div>

    <div class="form-group">
      <label>Senha *</label>
      <div class="senha-container">
        <input type="password" id="senha" required placeholder="Senha">
        <button type="button" class="btn-olho" id="btnOlhoSenha" tabindex="-1">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M247.31,124.76c-.35-.79-8.82-19.58-27.65-38.41C194.57,61.26,162.88,48,128,48S61.43,61.26,36.34,86.35C17.51,105.18,9,124,8.69,124.76a8,8,0,0,0,0,6.48c.35.79,8.82,19.58,27.65,38.41C61.43,194.74,93.12,208,128,208s66.57-13.26,91.66-38.35c18.83-18.83,27.3-37.62,27.65-38.41A8,8,0,0,0,247.31,124.76ZM128,192c-30.78,0-57.67-11.19-79.93-33.25A133.47,133.47,0,0,1,25,128,133.33,133.33,0,0,1,48.07,97.25C70.33,75.19,97.22,64,128,64s57.67,11.19,79.93,33.25A133.46,133.46,0,0,1,231,128c-7.22,13.47-38,64-103,64Zm0-112a48,48,0,1,0,48,48A48.05,48.05,0,0,0,128,80Zm0,80a32,32,0,1,1,32-32A32,32,0,0,1,128,160Z"></path></svg>
        </button>
      </div>
    </div>

    <div class="form-group">
      <label>Confirmar Senha *</label>
      <div class="senha-container">
        <input type="password" id="confirmaSenha" required placeholder="Confirme a senha">
        <button type="button" class="btn-olho" id="btnOlhoConfirma" tabindex="-1">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M247.31,124.76c-.35-.79-8.82-19.58-27.65-38.41C194.57,61.26,162.88,48,128,48S61.43,61.26,36.34,86.35C17.51,105.18,9,124,8.69,124.76a8,8,0,0,0,0,6.48c.35.79,8.82,19.58,27.65,38.41C61.43,194.74,93.12,208,128,208s66.57-13.26,91.66-38.35c18.83-18.83,27.3-37.62,27.65-38.41A8,8,0,0,0,247.31,124.76ZM128,192c-30.78,0-57.67-11.19-79.93-33.25A133.47,133.47,0,0,1,25,128,133.33,133.33,0,0,1,48.07,97.25C70.33,75.19,97.22,64,128,64s57.67,11.19,79.93,33.25A133.46,133.46,0,0,1,231,128c-7.22,13.47-38,64-103,64Zm0-112a48,48,0,1,0,48,48A48.05,48.05,0,0,0,128,80Zm0,80a32,32,0,1,1,32-32A32,32,0,0,1,128,160Z"></path></svg>
        </button>
      </div>
    </div>

    <button type="submit" class="btn-cadastro">Cadastrar</button>
    <div class="mensagem" id="mensagem"></div>
    <p class="link-login">Já tem conta? <a href="login.html">Faça login aqui</a></p>
  </form>
</div>

<script src="js/cadastro.js"></script>
</body>
</html>
