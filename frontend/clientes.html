<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clientes - Despachante Guaxupé</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/clientes.css" />
</head>
<body>

<button class="btn-menu-mobile" onclick="toggleMenu()">&#9776;</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="fecharMenu()"></div>

  <div class="sidebar">
    <div class="logo">Despachante <span>Guaxupé</span></div>
    <nav>
      <a href="index.html"><span>-</span>Dashboard</a>
      <a href="clientes.html" class="active"><span>-</span>Clientes</a>
      <a href="veiculos.html"><span>-</span>Veículos</a>
      <a href="processos.html"><span>-</span>Processos</a>
    </nav>
  </div>

  <div class="main">
    <div class="topo">
      <div>
        <h1>Clientes</h1>
        <p class="subtitulo">Gerencie os clientes cadastrados no sistema.</p>
      </div>
      <button class="btn-primary" onclick="abrirModal()">Novo Cliente</button>
    </div>

    <div class="section" style="margin-bottom: 20px;">
      <input
        type="text"
        id="campoBusca"
        placeholder="Buscar por nome ou CPF..."
        oninput="buscarClientes()"
      />
    </div>

    <div class="section">
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>CPF</th>
            <th>Telefone</th>
            <th>Cidade</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabelaClientes">
          <tr><td colspan="5" class="vazio">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitulo">Novo Cliente</h2>
        <button class="modal-fechar" onclick="fecharModal()">X</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="clienteId" />
        <div class="form-grid">
          <div class="form-group">
            <label>Nome completo *</label>
            <input type="text" id="nome" />
          </div>
          <div class="form-group">
            <label>CPF *</label>
            <input type="text" id="cpf" placeholder="000.000.000-00" />
          </div>
          <div class="form-group">
            <label>Telefone</label>
            <input type="text" id="telefone" placeholder="(00) 00000-0000" />
          </div>
          <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="email" />
          </div>
          <div class="form-group">
            <label>CEP</label>
            <input type="text" id="cep" placeholder="00000-000" onblur="buscarCEP()"/>
          </div>
          <div class="form-group">
            <label>Cidade</label>
            <input type="text" id="cidade" />
          </div>
          <div class="form-group full">
            <label>Endereço</label>
            <input type="text" id="endereco" />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secundario" onclick="fecharModal()">Cancelar</button>
        <button class="btn-primary" onclick="salvarCliente()">Salvar</button>
      </div>
    </div>
  </div>

  <script src="js/clientes.js"></script>
  <script>
function toggleMenu() {
  document.querySelector('.sidebar').classList.toggle('aberta');
  document.getElementById('sidebarOverlay').classList.toggle('ativo');
}
function fecharMenu() {
  document.querySelector('.sidebar').classList.remove('aberta');
  document.getElementById('sidebarOverlay').classList.remove('ativo');
}
</script>
</body>
</html>
