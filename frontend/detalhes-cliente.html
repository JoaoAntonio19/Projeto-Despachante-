<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha do Cliente - Despachante Guaxupé</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/detalhes-cliente.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="sidebar">
        <div class="logo">Despachante <span>Guaxupé</span></div>
        <nav>
            <a href="index.html"><i class="ph ph-chart-pie"></i> Dashboard</a>
            <a href="clientes.html" class="active"><i class="ph ph-users"></i> Clientes</a>
            <a href="veiculos.html"><i class="ph ph-car"></i> Veículos</a>
            <a href="processos.html"><i class="ph ph-file-text"></i> Processos</a>
            <a href="consulta.html"><i class="ph ph-magnifying-glass"></i> Consulta</a>
        </nav>
    </div>

    <div class="main">
        <button class="btn-voltar" onclick="history.back()">
            <i class="ph ph-arrow-left"></i> Voltar para Lista
        </button>
        
        <div class="container-ficha">
            <div class="topo" style="margin-bottom: 20px;">
                <div class="topo-info">
                    <h1 id="nomeClienteH1">Carregando...</h1>
                    <p class="subtitulo">Ficha Cadastral do Cliente</p>
                </div>
            </div>

            <div class="card-ficha">
                <div class="card-header-flex">
                    <h3><i class="ph ph-user"></i> Dados Pessoais</h3>
                    <button class="btn-primary" onclick="abrirModalEditar()" style="padding: 6px 12px; font-size: 13px;">
                        <i class="ph ph-pencil-simple"></i> Editar Dados
                    </button>
                </div>
                
                <div class="dado-grid">
                    <div class="dado-item"><label>CPF</label><span id="fichaCpf">--</span></div>
                    <div class="dado-item"><label>Telefone</label><span id="fichaTelefone">--</span></div>
                    <div class="dado-item"><label>Email</label><span id="fichaEmail">--</span></div>
                    <div class="dado-item"><label>Endereço Completo</label><span id="fichaEndereco">--</span></div>
                </div>
            </div>

           <div class="card-ficha" style="margin-top: 20px;">
                <h3><i class="ph ph-folder-open"></i> Documentos Anexados</h3>
                <div id="galeriaDocumentos" class="dado-grid">
                    <p style="color: #64748b; font-size: 13px;">Buscando documentos...</p>
                </div>
            </div>
        </div>  
    </div>

    <div class="modal-overlay" id="modalCliente">
      <div class="modal">
        <div class="modal-header">
          <h2>Editar Cliente</h2>
          <button class="modal-fechar" onclick="fecharModalCliente()">&times;</button>
        </div>
        <div class="modal-body">
          <form id="formCliente">
            <input type="hidden" id="clienteId" />
            <div class="form-grid">
              <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="clienteNome" required />
              </div>
              <div class="form-group">
                <label>CPF</label>
                <input type="text" id="clienteCpf" maxlength="14" required />
              </div>
              <div class="form-group">
                <label>Telefone</label>
                <input type="text" id="clienteTelefone" maxlength="15" />
              </div>
              <div class="form-group">
                <label>Email</label>
                <input type="email" id="clienteEmail" />
              </div>
              <div class="form-group">
                <label>CEP</label>
                <input type="text" id="clienteCep" maxlength="9" />
              </div>
              <div class="form-group full">
                <label>Endereço</label>
                <input type="text" id="clienteEndereco" />
              </div>
              <div class="form-group">
                <label>Cidade</label>
                <input type="text" id="clienteCidade" />
              </div>
              <div class="form-group">
                <label>Estado</label>
                <input type="text" id="clienteEstado" maxlength="2" />
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn-primary" onclick="salvarEdicao()">Salvar Alterações</button>
        </div>
      </div>
    </div>

    <script src="js/login.js"></script>
    <script src="js/detalhes-cliente.js"></script>
</body>
</html>
