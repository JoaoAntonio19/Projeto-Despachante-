<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Veículos - Despachante Guaxupé</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/veiculos.css" />
</head>
<body>

<button class="btn-menu-mobile" onclick="toggleMenu()">&#9776;</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="fecharMenu()"></div>

<div class="sidebar">
  <div class="logo">Despachante <span>Guaxupé</span></div>
  <nav>
    <a href="index.html">Dashboard</a>
    <a href="clientes.html">Clientes</a>
    <a href="veiculos.html" class="active">Veículos</a>
    <a href="processos.html">Processos</a>
  </nav>
  <div class="sidebar-rodape">Sistema v1.0 &mdash; Guaxupé</div>
</div>

<div class="main">
  <div class="topo">
    <div class="topo-info">
      <h1>Veículos</h1>
      <p class="subtitulo">Gerencie os veículos cadastrados no sistema.</p>
    </div>
    <button class="btn-primary" onclick="abrirModal()">+ Novo Veículo</button>
  </div>

  <div class="section" style="margin-bottom: 20px;">
    <input type="text" id="campoBusca" placeholder="Buscar por placa ou chassi..." oninput="buscarVeiculos()" />
  </div>

  <div class="section">
    <table>
      <thead>
        <tr>
          <th>Placa</th>
          <th>Renavam</th>
          <th>Chassi</th>
          <th>Categoria</th>
          <th>Ano Mod. / Fab.</th>
          <th>Combustível</th>
          <th>Proprietário</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabelaVeiculos">
        <tr><td colspan="8" class="vazio">Carregando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitulo">Novo Veículo</h2>
      <button class="modal-fechar" onclick="fecharModal()">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="veiculoId" />
      <div class="form-grid">
        <div class="form-group">
          <label>Proprietário *</label>
          <select id="cliente_id">
            <option value="">Selecione o proprietário</option>
          </select>
        </div>
        <div class="form-group">
          <label>Placa *</label>
          <input type="text" id="placa" placeholder="ABC-1234" />
        </div>
        <div class="form-group">
          <label>Marca</label>
          <input type="text" id="marca" />
        </div>
        <div class="form-group">
          <label>Modelo</label>
          <input type="text" id="modelo" />
        </div>
        <div class="form-group">
          <label>RENAVAM</label>
          <input type="text" id="renavam" />
        </div>
        <div class="form-group">
          <label>Chassi</label>
          <input type="text" id="chassi" />
        </div>
        <div class="form-group">
          <label>Categoria</label>
          <select id="categoria">
            <option value="">Selecione</option>
            <option>Particular</option>
            <option>Comercial</option>
            <option>Moto</option>
            <option>Caminhão</option>
            <option>Ônibus</option>
          </select>
        </div>
        <div class="form-group">
          <label>Combustível</label>
          <select id="combustivel">
            <option value="">Selecione</option>
            <option>Gasolina</option>
            <option>Etanol</option>
            <option>Flex</option>
            <option>Diesel</option>
            <option>Elétrico</option>
            <option>GNV</option>
          </select>
        </div>
        <div class="form-group">
          <label>Ano Modelo</label>
          <input type="text" id="ano_modelo" placeholder="2024" />
        </div>
        <div class="form-group">
          <label>Ano Fabricação</label>
          <input type="text" id="ano_fabricacao" placeholder="2023" />
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secundario" onclick="fecharModal()">Cancelar</button>
      <button class="btn-primary" onclick="salvarVeiculo()">Salvar</button>
    </div>
  </div>
</div>

<script src="js/veiculos.js"></script>
<script>
  function toggleMenu() {
    document.querySelector('.sidebar').classList.toggle('aberta');
    document.getElementById('sidebarOverlay').classList.toggle('ativo');
  }
  function fecharMenu() {
    document.querySelector('.sidebar').classList.remove('aberta');
    document.getElementById('sidebarOverlay').classList.remove('ativo');
  }
</script>
</body>
</html>
